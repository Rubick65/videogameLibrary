<app-auth-container title="Edit Your Profile">
  <div id="file_container">
    <label for="file_input" id="file_label">
      <img
        id="previsualization_image"
        src="assets/profile/profile_dark.png"
        alt="Select an image"
      />
    </label>

    <input type="file" id="file_input" accept="image/*" style="display: none" hidden />
  </div>

  <form id="profile_form">
    <div class="form-group">
      <i
        class="fas fa-user"
        style="position: absolute; margin-left: 10px; top: 10px; font-size: 25px"
      ></i>

      <input
        type="text"
        id="username"
        name="username"
        class="profile_input"
        formControlName="username"
        placeholder="Username"
        required
      />
    </div>

    <div class="form-group">
      <i
        class="fa-solid fa-t"
        style="position: absolute; margin-left: 10px; top: 10px; font-size: 25px"
      ></i>

      <textarea
        form=""
        id="description"
        name="description"
        class="description_input"
        formControlName="description"
        placeholder="Tell us about you!"
        wrap="hard"
        required
      ></textarea>
    </div>
  </form>
</app-auth-container>
