<app-auth-container title="Edit Your Profile">

   <div id="file_container">

            <label for="file_input" id="file_label">

                <img id="previsualization_image" src="assets/profile/profile_dark.png" alt="Select an image">

            </label>
            
            <input type="file" id="file_input" accept="image/*" style="display: none;" hidden>

    </div>

    <form class="profile_form">

        <div class="form-group" >

            <i class="fas fa-user" style="
             position:absolute;
             margin-left: 10px;
             top: 10px;
             font-size: 25px;
            "></i>

            <input type="text" id="username" name="username" [textContent]="'user'" class="profile_input" formControlName="username" required>

        </div>        

    </form>

</app-auth-container>
