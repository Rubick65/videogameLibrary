<div class="login-container"> 
    <h2 id="login-title">Login</h2>
    
    <form class="login-form">

  
      <div class="form-group">
        <i class="fas fa-envelope" style="
          position:absolute;
          margin-left: 15px;
          top: 14px;
          font-size: 20px;
          "></i>
        <input type="email" id="email" name="email" placeholder="Email" class="form-input" required>
      </div>
      
      <div class="form-group">
        <i class="fas fa-lock" style="
          position:absolute;
          margin-left: 15px;
          top: 14px;
          font-size: 20px;
          "></i>
        <input type="password" id="password" name="password" placeholder="Password" class="form-input" required>
      </div>

      <button type="submit" class="login-button">Login</button>
    </form> 
</div>
