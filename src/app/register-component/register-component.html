<div class="register-container"> 
    <h2 id="register-title">Register</h2>
    
    <form class="register-form">

      <div class="form-group">
        <i class="fas fa-user" id="username" style="
          position:absolute;
          margin-left: 15px;
          top: 14px;
          font-size: 20px;
          "></i>
        <input type="text" id="username" name="username" placeholder="Username" class="form-input" required>
      </div>
      

      <div class="form-group">
        <i class="fas fa-envelope" style="
          position:absolute;
          margin-left: 15px;
          top: 14px;
          font-size: 20px;
          "></i>
        <input type="email" id="email" name="email" placeholder="Email" class="form-input" required>
      </div>
      
      <div class="form-group">
        <i class="fas fa-lock" style="
          position:absolute;
          margin-left: 15px;
          top: 14px;
          font-size: 20px;
          "></i>
        <input type="password" id="password" name="password" placeholder="Password" class="form-input" required>
      </div>

       <div class="form-group">
        <i class="fas fa-lock" style="
          position:absolute;
          margin-left: 15px;
          top: 14px;
          font-size: 20px;
          "></i>
        <input type="password" id="password" name="password" placeholder="Confirm Password" class="form-input" required>
      </div>

      <button type="submit" class="register-button">Sign Up</button>
    </form> 
</div>
